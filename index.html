<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <title>Pysäköintikartta</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* Täyttää koko näytön ilman valkoisia reunat */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000;
        }
        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            width: 100%; 
        }

        /* Keskellä oleva P-merkki - Finnair Blue */
        #center-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            pointer-events: none;
            z-index: 10;
        }
        .p-icon {
            background-color: #0C0243; /* Finnair Blue */
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            font-weight: bold;
            font-size: 17px;
        }
        .p-icon span { transform: rotate(45deg); }

        /* Tietolaatikko alareunassa */
        #info-box {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 80px; /* Jätetään tilaa paikannusnapille */
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 11;
            display: none;
            font-family: sans-serif;
        }

        /* HSL-TYYLINEN GPS-MARKKERI */
        .maplibregl-user-location-dot {
            background-color: transparent !important;
            border: 2px solid white !important;
            border-radius: 50% !important;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4) !important;
            width: 26px !important;
            height: 26px !important;
        }
        .maplibregl-user-location-dot::before {
            background-color: #0089ff !important;
            border-radius: 50% !important;
            width: 12px !important;
            height: 12px !important;
        }
        .maplibregl-user-location-heading::after {
            border-bottom-color: #0089ff !important; /* Suuntakolmio */
        }
        .maplibregl-user-location-accuracy-circle {
            background-color: rgba(0, 137, 255, 0.1) !important;
        }

        /* Paikannusnappi aivan oikeaan alareunaan */
        .maplibregl-ctrl-bottom-right {
            bottom: 20px !important;
            right: 10px !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="center-marker"><div class="p-icon"><span>P</span></div></div>
    <div id="info-box"><div id="info-content"></div></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', 
            center: [23.76, 61.494],
            zoom: 12,
            dragRotate: false,
            attributionControl: false // POISTAA TEKIJÄNOIKEUSMERKIN
        });

        const infoBox = document.getElementById('info-box');
        const infoContent = document.getElementById('info-content');
        let hoveredId = null;

        map.on('load', () => {
            map.touchZoomRotate.disableRotation();

            // Paikannusnappi
            const geolocate = new maplibregl.GeolocateControl({
                positionOptions: { enableHighAccuracy: true },
                trackUserLocation: true,
                showUserHeading: true // Näyttää suuntanuolen (HSL-tyyli)
            });
            map.addControl(geolocate, 'bottom-right');

            // Paikannusvirheiden seuranta
            geolocate.on('error', (e) => {
                if (e.code === 1) alert('Salli sijainti puhelimen asetuksista.');
            });

            // Parkkipaikka-aineisto
            map.addSource('parkit', {
                'type': 'geojson',
                'data': 'tampere_pysakointi_pysakointipaikat_polygon_gk24 (1).json',
                'generateId': true 
            });

            map.addLayer({
                'id': 'parkki-fill',
                'type': 'fill',
                'source': 'parkit',
                'minzoom': 13.0, // Näkyy tasolta 13 alkaen
                'paint': {
                    'fill-color': '#7d97f4',
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.5, 0.25]
                }
            });

            map.addLayer({
                'id': 'parkki-outline',
                'type': 'line',
                'source': 'parkit',
                'minzoom': 13.0,
                'paint': {
                    'line-color': '#5a78ed',
                    'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 4, 1.5]
                }
            });

            // Päivitetään tiedot keskipisteen mukaan
            function updateCenterSelection() {
                const center = map.project(map.getCenter());
                const features = map.queryRenderedFeatures(center, { layers: ['parkki-fill'] });

                if (features.length > 0) {
                    const feature = features[0];
                    const newId = feature.id;

                    if (newId !== hoveredId) {
                        if (hoveredId !== null) map.setFeatureState({ source: 'parkit', id: hoveredId }, { hover: false });
                        hoveredId = newId;
                        map.setFeatureState({ source: 'parkit', id: hoveredId }, { hover: true });

                        infoBox.style.display = 'block';
                        const p = feature.properties;
                        infoContent.innerHTML = `<strong>${p.TARKOITUS || 'Pysäköintialue'}</strong><br>${p.MAKSULLISUUS || ''}`;
                    }
                } else {
                    if (hoveredId !== null) {
                        map.setFeatureState({ source: 'parkit', id: hoveredId }, { hover: false });
                        hoveredId = null;
                        infoBox.style.display = 'none';
                    }
                }
            }

            map.on('move', updateCenterSelection);
            updateCenterSelection();
        });
    </script>
</body>
</html>
