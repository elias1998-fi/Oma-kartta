<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <title>Helsinki & Tampere - Pysäköintikartta</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container { display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; padding-top: env(safe-area-inset-top); }

        #center-marker {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -100%); pointer-events: none; z-index: 10;
        }
        
        .p-icon {
            background-color: #0C0243; color: white; width: 32px; height: 32px;
            border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            font-weight: bold; font-size: 17px;
        }
        .p-icon span { transform: rotate(45deg); }

        #info-box {
            position: absolute; top: calc(env(safe-area-inset-top) + 20px); 
            left: 20px; right: 20px; background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 11; display: none;
        }

        /* GPS nuoli */
        .maplibregl-user-location-dot {
            background-color: white !important; width: 28px !important; height: 28px !important;
            border-radius: 50% !important; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3) !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
        }
        .maplibregl-user-location-dot::before {
            content: '' !important; display: block !important; width: 14px !important; height: 14px !important;
            background-color: #007aff !important; border-radius: 50% !important; position: relative !important;
            top: 0 !important; left: 0 !important;
        }
        .maplibregl-user-location-heading::after {
            content: '' !important; position: absolute !important; bottom: 18px !important; left: 50% !important;
            transform: translateX(-50%) !important; border-left: 10px solid transparent !important;
            border-right: 10px solid transparent !important; border-bottom: 16px solid #007aff !important;
            filter: drop-shadow(0 -1px 2px rgba(0,0,0,0.2)) !important;
        }
        .maplibregl-user-location-accuracy-circle { background-color: rgba(0, 122, 255, 0.1) !important; }

        .maplibregl-ctrl-bottom-right { bottom: calc(env(safe-area-inset-bottom) + 80px) !important; right: 15px !important; }

        #bottom-nav {
            background-color: white; height: calc(70px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #eee; z-index: 100; padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #757575; text-decoration: none; font-size: 11px; font-weight: 500; flex-grow: 1; padding-top: 10px;
        }
        .nav-item.active { color: #007aff; }
        .nav-icon { font-size: 26px; margin-bottom: 4px; }
        .maplibregl-ctrl-attrib {
            background-color: rgba(255, 255, 255, 0.7) !important; padding: 2px 5px !important; border-radius: 4px !important;
            font-size: 10px !important; bottom: calc(env(safe-area-inset-bottom) + 75px) !important; right: 10px !important;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="map"></div>
        <div id="center-marker"><div class="p-icon"><span>P</span></div></div>
        <div id="info-box"><div id="info-content"></div></div>

        <div id="bottom-nav">
            <a href="#" class="nav-item"><i class="material-icons nav-icon">home</i>KOTI</a>
            <a href="#" class="nav-item"><i class="material-icons nav-icon">confirmation_number</i>LIPUT</a>
            <a href="#" class="nav-item active"><i class="material-icons nav-icon">near_me</i>REITTIOPAS</a>
            <a href="#" class="nav-item"><i class="material-icons nav-icon">menu</i>LISÄÄ</a>
        </div>
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', 
            center: [24.938, 60.169], // Asetetaan alotus keskelle Helsinkiä
            zoom: 12,
            dragRotate: false
        });

        const infoBox = document.getElementById('info-box');
        const infoContent = document.getElementById('info-content');
        
        // Nyt meidän pitää muistaa, MIKÄ alue on valittuna ja MISTÄ lähteestä se tulee
        let hoveredState = null; // esim. { id: 123, source: 'tampere-parkit' }

        map.on('load', () => {
            map.touchZoomRotate.disableRotation();

            const geolocate = new maplibregl.GeolocateControl({
                positionOptions: { enableHighAccuracy: true },
                trackUserLocation: true, showUserHeading: true 
            });
            map.addControl(geolocate, 'bottom-right');

            // --- 1. TAMPEREEN DATA ---
            map.addSource('tampere-parkit', {
                'type': 'geojson',
                'data': 'tampere_pysakointi_pysakointipaikat_polygon_gk24 (1).json',
                'generateId': true 
            });

            // Tampereen kerrokset
            map.addLayer({
                'id': 'tampere-fill',
                'type': 'fill',
                'source': 'tampere-parkit',
                'minzoom': 13.0, 
                'paint': {
                    'fill-color': [
                        'match',
                        ['concat', ['get', 'VYOHYKE'], ':', ['get', 'AIKARAJOITUS'], ':', ['get', 'MAKSULLISUUS']],
                        '1:8-18 (8-16):Maksullinen', '#FF0000', 
                        '2:8-18 (8-16):Maksullinen', '#FFFF00', 
                        '3:8-18 (8-16):Maksullinen', '#00FF00', 
                        '::Maksullinen', '#0000FF', 
                        '#7D97F4' 
                    ],
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.5, 0.25]
                }
            });
            map.addLayer({
                'id': 'tampere-outline', 'type': 'line', 'source': 'tampere-parkit', 'minzoom': 13.0,
                'paint': { 'line-color': '#5a78ed', 'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 4, 1.5] }
            });

            // --- 2. HELSINGIN DATA ---
            map.addSource('helsinki-parkit', {
                'type': 'geojson',
                'data': 'helsinki_parkit.geojson', // Nimi johon tallensit konvertoidun tiedoston!
                'generateId': true 
            });

            // Helsingin kerrokset (värjätään esim. turkoosiksi erottumaan hieman)
            map.addLayer({
                'id': 'helsinki-fill',
                'type': 'fill',
                'source': 'helsinki-parkit',
                'minzoom': 13.0, 
                'paint': {
                    'fill-color': '#00BCD4', // Turkoosi
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.5, 0.25]
                }
            });
            map.addLayer({
                'id': 'helsinki-outline', 'type': 'line', 'source': 'helsinki-parkit', 'minzoom': 13.0,
                'paint': { 'line-color': '#008080', 'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 4, 1.5] }
            });

            // --- PÄIVITYSFUNKTIO ---
            function updateCenterSelection() {
                const center = map.project(map.getCenter());
                // Etsitään osumia MOLEMMISTA täyttökerroksista
                const features = map.queryRenderedFeatures(center, { layers: ['tampere-fill', 'helsinki-fill'] });

                if (features.length > 0) {
                    const feature = features[0];
                    const newId = feature.id;
                    const newSource = feature.source;

                    // Jos ollaan uuden alueen päällä
                    if (!hoveredState || newId !== hoveredState.id || newSource !== hoveredState.source) {
                        
                        // 1. Poistetaan korostus vanhasta
                        if (hoveredState) {
                            map.setFeatureState({ source: hoveredState.source, id: hoveredState.id }, { hover: false });
                        }
                        
                        // 2. Lisätään korostus uuteen
                        hoveredState = { id: newId, source: newSource };
                        map.setFeatureState({ source: hoveredState.source, id: hoveredState.id }, { hover: true });

                        // 3. Näytetään tiedot lähteestä riippuen
                        infoBox.style.display = 'block';
                        const p = feature.properties;
                        
                        if (newSource === 'tampere-parkit') {
                            infoContent.innerHTML = `<strong>${p.TARKOITUS || 'Pysäköintialue'}</strong><br>
                            Vyöhyke: ${p.VYOHYKE || '-'}<br>
                            Aika: ${p.AIKARAJOITUS || '-'}<br>
                            ${p.MAKSULLISUUS || ''}`;
                        } else if (newSource === 'helsinki-parkit') {
                            infoContent.innerHTML = `<strong>${p['hel:luokka_nimi'] || 'Pysäköintialue'}</strong><br>
                            Voimassa: ${p['hel:voimassaolo'] || '-'}<br>
                            Kesto: ${p['hel:kesto'] || '-'}<br>
                            Arvioitu paikkamäärä: ${p['hel:paikat_ala'] || '-'}`;
                        }
                    }
                } else {
                    // Jos ei osuta mihinkään
                    if (hoveredState) {
                        map.setFeatureState({ source: hoveredState.source, id: hoveredState.id }, { hover: false });
                        hoveredState = null;
                        infoBox.style.display = 'none';
                    }
                }
            }

            map.on('move', updateCenterSelection);
            updateCenterSelection();
        });
    </script>
</body>
</html>
