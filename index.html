<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Minun HSL Karttani</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json',
            center: [24.94, 60.17],
            zoom: 12
        });

        // Lataa yksittäinen Maki-ikoni unpkg:sta ja rekisteröi kartalle
        async function loadMakiIcon(map, iconName, makiName, color) {
            try {
                const res = await fetch(`https://unpkg.com/@mapbox/maki/icons/${makiName}.svg`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                let svg = await res.text();

                // Lisätään fill-väri ja skaalataan 15→22px
                svg = svg
                    .replace('<svg ', `<svg fill="${color}" `)
                    .replace(/width="15"/, 'width="22"')
                    .replace(/height="15"/, 'height="22"');

                const img = new Image(22, 22);
                await new Promise((ok, fail) => {
                    img.onload = ok;
                    img.onerror = fail;
                    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
                });
                map.addImage(iconName, img);
            } catch (err) {
                console.warn(`Ikoni "${iconName}" ei latautunut:`, err);
            }
        }

        map.on('load', async () => {
            // Ikonit ladataan rinnakkain – epäonnistuminen ei kaada karttaa
            await Promise.allSettled([
                loadMakiIcon(map, 'poi-restaurant',  'restaurant',       '#c0392b'),
                loadMakiIcon(map, 'poi-fast-food',   'fast-food',        '#e67e22'),
                loadMakiIcon(map, 'poi-grocery',     'grocery',          '#27ae60'),
                loadMakiIcon(map, 'poi-convenience', 'convenience-store','#8e44ad'),
                loadMakiIcon(map, 'poi-shop',        'clothing-store',   '#2980b9'),
            ]);
        });
    </script>
</body>
</html>
