<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Minun HSL Karttani</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', // Viittaa samaan kansioon ladattuun tiedostoon
            center: [24.94, 60.17], // Helsinki
            zoom: 12,
            dragRotate: false,      // Estää kääntämisen hiiren oikealla painikkeella
            touchPitch: false,      // Estää kartan kallistamisen kahdella sormella
            pitchWithRotate: false  // Varmistaa, ettei kallistus aktivoidu vahingossa
        });

        // Lukitaan pohjoissuunta puhelimen näytöllä (estetään sormilla pyörittäminen)
        map.on('load', () => {
            map.touchZoomRotate.disableRotation();
        });
    </script>
</body>
</html>
