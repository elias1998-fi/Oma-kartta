<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <title>Pysäköintikartta</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* --- PERUSTYYLIT --- */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #map { 
            flex-grow: 1; 
            width: 100%; 
        }

        /* --- TÄHTÄIN (P-MERKKI) --- */
        #center-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            pointer-events: none;
            z-index: 10;
        }
        .p-icon {
            background-color: #0C0243;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            font-weight: bold;
            font-size: 17px;
        }
        .p-icon span { transform: rotate(45deg); }

        /* --- TIETOLAATIKKO --- */
        #info-box {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 20px); 
            left: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 11;
            display: none;
        }

        /* --- HSL-TYYLINEN GPS-SUUNTANUOLI --- */
        .maplibregl-user-location-dot {
            background-color: white !important;
            width: 28px !important;
            height: 28px !important;
            border-radius: 50% !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        .maplibregl-user-location-dot::before {
            content: '' !important;
            display: block !important;
            width: 14px !important;
            height: 14px !important;
            background-color: #007aff !important;
            border-radius: 50% !important;
            position: relative !important;
            top: 0 !important;
            left: 0 !important;
        }
        
        .maplibregl-user-location-heading::after {
            content: '' !important;
            position: absolute !important;
            bottom: 18px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            border-left: 10px solid transparent !important;
            border-right: 10px solid transparent !important;
            border-bottom: 16px solid #007aff !important;
            filter: drop-shadow(0 -1px 2px rgba(0,0,0,0.2)) !important;
        }

        .maplibregl-user-location-accuracy-circle {
            background-color: rgba(0, 122, 255, 0.1) !important;
        }

        /* --- KONTROLLIT --- */
        .maplibregl-ctrl-bottom-right {
            bottom: calc(env(safe-area-inset-bottom) + 105px) !important; 
            right: 15px !important;
        }

        /* --- ALAPALKKI --- */
        #bottom-nav {
            background-color: white;
            height: calc(75px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            z-index: 100;
            padding-bottom: calc(5px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #757575;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            flex-grow: 1;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .maplibregl-ctrl-attrib {
            font-size: 9px !important;
            bottom: calc(env(safe-area-inset-bottom) + 90px) !important;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="map"></div>
        
        <div id="center-marker">
            <div class="p-icon"><span>P</span></div>
        </div>

        <div id="info-box"><div id="info-content"></div></div>

        <div id="bottom-nav">
            <a href="#" class="nav-item">
                <i class="material-icons nav-icon">home</i>
                KOTI
            </a>
            <a href="#" class="nav-item">
                <i class="material-icons nav-icon">confirmation_number</i>
                LIPUT
            </a>
            <a href="#" class="nav-item active">
                <i class="material-icons nav-icon">near_me</i>
                REITTIOPAS
            </a>
            <a href="#" class="nav-item">
                <i class="material-icons nav-icon)menu</i>
                LISÄÄ
            </a>
        </div>
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', 
            center: [23.76, 61.494],
            zoom: 12,
            dragRotate: false
        });

        const infoBox = document.getElementById('info-box');
        const infoContent = document.getElementById('info-content');
        let hoveredId = null;

        map.on('load', () => {
            map.touchZoomRotate.disableRotation();

            const geolocate = new maplibregl.GeolocateControl({
                positionOptions: { enableHighAccuracy: true },
                trackUserLocation: true,
                showUserHeading: true 
            });
            map.addControl(geolocate, 'bottom-right');

            map.addSource('parkit', {
                'type': 'geojson',
                'data': 'tampere_pysakointi_pysakointipaikat_polygon_gk24 (1).json',
                'generateId': true 
            });

            map.addLayer({
                'id': 'parkki-fill',
                'type': 'fill',
                'source': 'parkit',
                'minzoom': 13.0, 
                'paint': {
                    'fill-color': '#7d97f4',
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.5, 0.25]
                }
            });

            map.addLayer({
                'id': 'parkki-outline',
                'type': 'line',
                'source': 'parkit',
                'minzoom': 13.0,
                'paint': {
                    'line-color': '#5a78ed',
                    'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 4, 1.5]
                }
            });

            function updateCenterSelection() {
                const center = map.project(map.getCenter());
                const features = map.queryRenderedFeatures(center, { layers: ['parkki-fill'] });

                if (features.length > 0) {
                    const feature = features[0];
                    const newId = feature.id;

                    if (newId !== hoveredId) {
                        if (hoveredId !== null) map.setFeatureState({ source: 'parkit', id: hoveredId }, { hover: false });
                        
                        hoveredId = newId;
                        map.setFeatureState({ source: 'parkit', id: hoveredId }, { hover: true });

                        // HAPTINEN TÄRINÄ: Lyhyt 15ms värähdys kun osutaan alueelle
                        if (navigator.vibrate) {
                            navigator.vibrate(15);
                        }

                        infoBox.style.display = 'block';
                        const p = feature.properties;
                        infoContent.innerHTML = `<strong>${p.TARKOITUS || 'Pysäköintialue'}</strong><br>${p.MAKSULLISUUS || ''}`;
                    }
                } else {
                    if (hoveredId !== null) {
                        map.setFeatureState({ source: 'parkit', id: hoveredId }, { hover: false });
                        hoveredId = null;
                        infoBox.style.display = 'none';
                    }
                }
            }

            map.on('move', updateCenterSelection);
            updateCenterSelection();
        });
    </script>
</body>
</html>
