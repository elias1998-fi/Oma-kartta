<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Minun HSL Karttani</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', // Viittaa tyylitiedostoosi
            center: [24.94, 60.17], // Helsinki
            zoom: 12,
            dragRotate: false,      
            touchPitch: false,      
            pitchWithRotate: false  
        });

        map.on('load', () => {
            // 1. Lukitaan pohjoissuunta
            map.touchZoomRotate.disableRotation();

            // 2. Lisätään maksuvyöhykkeiden datalähde (GeoJSON-tiedosto)
            map.addSource('pysakointivyohykkeet', {
                'type': 'geojson',
                'data': 'maksuvyohykkeet.geojson' // Varmista, että tiedostonimi on GitHubissa täsmälleen tämä
            });

            // 3. Lisätään vyöhykkeiden täyttöväri (Fill)
            map.addLayer({
                'id': 'vyohykkeet-fill',
                'type': 'fill',
                'source': 'pysakointivyohykkeet',
                'paint': {
                    'fill-color': [
                        'match',
                        ['get', 'vyohykkeen_nro'], // Etsitään datasta vyöhykkeen numero
                        '1', '#ff4b4b',            // Vyöhyke 1: Punainen
                        '2', '#4b73ff',            // Vyöhyke 2: Sininen
                        '#888888'                  // Muut: Harmaa
                    ],
                    'fill-opacity': 0.35           // Läpinäkyvyys, jotta kadut näkyvät alta
                }
            });

            // 4. Lisätään vyöhykkeiden valkoiset reunaviivat
            map.addLayer({
                'id': 'vyohykkeet-outline',
                'type': 'line',
                'source': 'pysakointivyohykkeet',
                'paint': {
                    'line-color': '#ffffff',
                    'line-width': 1.5
                }
            });
        });
    </script>
</body>
</html>
