<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Tampereen Pysäköintikartta</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', // HSL-tyylisi
            center: [23.76, 61.494], // Keskitytään Tampereelle
            zoom: 14,
            dragRotate: false,
            touchPitch: false
        });

        map.on('load', () => {
            map.touchZoomRotate.disableRotation();

            // 1. TUODAAN DATA GITHUBISTA
            // HUOM: Tiedostonimen on oltava TÄSMÄLLEEN sama kuin lataamasi tiedosto
            map.addSource('tampere-parkit', {
                'type': 'geojson',
                'data': 'tampere_pysakointi_pysakointipaikat_polygon_gk24 (1).geojson'
            });

            // 2. PIIRRETÄÄN ALUEIDEN TÄYTTÖ (Fill)
            map.addLayer({
                'id': 'parkki-alueet-fill',
                'type': 'fill',
                'source': 'tampere-parkit',
                'paint': {
                    'fill-color': '#007AFF', // Sininen väri
                    'fill-opacity': 0.5      // Puoliläpinäkyvä
                }
            });

            // 3. LISÄTÄÄN REUNAVIIVAT (Line)
            map.addLayer({
                'id': 'parkki-alueet-line',
                'type': 'line',
                'source': 'tampere-parkit',
                'paint': {
                    'line-color': '#ffffff',
                    'line-width': 1
                }
            });

            // 4. NÄYTETÄÄN TIEDOT KLIKATTAESSA
            map.on('click', 'parkki-alueet-fill', (e) => {
                const props = e.features[0].properties;
                let popupSisalto = '<div style="font-family:sans-serif; font-size:12px;"><strong>Pysäköintipaikka</strong><br><hr>';
                
                // Käydään läpi kaikki ominaisuustiedot, mitä Tampereen data sisältää
                for (const avain in props) {
                    popupSisalto += `<b>${avain}:</b> ${props[avain]}<br>`;
                }
                popupSisalto += '</div>';

                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(popupSisalto)
                    .addTo(map);
            });

            map.on('mouseenter', 'parkki-alueet-fill', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'parkki-alueet-fill', () => { map.getCanvas().style.cursor = ''; });
        });
    </script>
</body>
</html>
