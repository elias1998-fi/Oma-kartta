<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Tampereen Pysäköintikartta</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/link/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .maplibregl-popup { font-family: sans-serif; font-size: 12px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json', // Käyttää sinun HSL-tyyliäsi
            center: [23.76, 61.494], // Tampereen keskusta
            zoom: 14,
            dragRotate: false,
            touchPitch: false
        });

        map.on('load', () => {
            // Lukitaan pohjoinen ylöspäin
            map.touchZoomRotate.disableRotation();

            // 1. Ladataan data GitHubista (Huom: tiedostonimi täsmälleen kuten sanoit)
            map.addSource('tampere-parkit', {
                'type': 'geojson',
                'data': 'tampere_pysakointi_pysakointipaikat_polygon_gk24 (1).json'
            });

            // 2. Piirretään alueet sinisellä
            map.addLayer({
                'id': 'parkki-fill',
                'type': 'fill',
                'source': 'tampere-parkit',
                'paint': {
                    'fill-color': '#007AFF',
                    'fill-opacity': 0.5
                }
            });

            // 3. Lisätään valkoiset reunat, jotta alueet erottuvat paremmin
            map.addLayer({
                'id': 'parkki-outline',
                'type': 'line',
                'source': 'tampere-parkit',
                'paint': {
                    'line-color': '#ffffff',
                    'line-width': 1
                }
            });

            // 4. Klikkaus-popup: näyttää kaikki tiedot mitä tiedostosta löytyy
            map.on('click', 'parkki-fill', (e) => {
                const props = e.features[0].properties;
                let html = '<strong>Pysäköintipaikka</strong><br><hr>';
                
                // Käydään läpi kaikki tiedot (osoite, tyyppi, hinta jne.)
                for (const key in props) {
                    html += `<b>${key}:</b> ${props[key]}<br>`;
                }

                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(html)
                    .addTo(map);
            });

            // Muutetaan kursori sormeksi, kun ollaan alueen päällä
            map.on('mouseenter', 'parkki-fill', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'parkki-fill', () => { map.getCanvas().style.cursor = ''; });
        });

        // Virheen käsittely, jos tiedostoa ei löydy
        map.on('error', (e) => {
            console.log('Karttavirhe:', e.error.message);
        });
    </script>
</body>
</html>
